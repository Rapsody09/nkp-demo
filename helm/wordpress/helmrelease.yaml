apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wordpress
spec:
  interval: 15m
  timeout: 15m
  chart:
    spec:
      chart: wordpress
      version: "30.1.8"   # chart Bitnami — appVersion 6.9.4 (vérif. sur artifacthub.io/packages/helm/bitnami/wordpress)
      sourceRef:
        kind: HelmRepository
        name: bitnami
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # =========================================================
    # ⚠️ Note sur le "StatefulSet demo"
    # ---------------------------------------------------------
    # Le chart Bitnami WordPress ne sait déployer que des
    # Deployment (pas de StatefulSet pour WordPress lui-même).
    # → WordPress  : Deployment + PVC RWO (persistance wp-content)
    # → MariaDB    : StatefulSet (sous-chart, persistance native)
    # La démo "kill pod / data persiste" reste valable sur les
    # deux côtés grâce aux PVC.
    # =========================================================

    # --- Global ---
    global:
      security:
        # Depuis le chart 24.1.0, Bitnami vérifie la signature
        # des images. Désactivé ici car on tire via un miroir
        # Dockerhub interne (la signature ne suit pas forcément).
        allowInsecureImages: true

    # --- WordPress ---
    replicaCount: 1
    updateStrategy:
      # Obligatoire avec un PVC RWO mono-pod
      type: Recreate

    image:
      registry: nkpdemo.devops-hc.dev:5000
      repository: dockerhub-cache/bitnami/wordpress
      # tag : laisser celui du chart (6.8.2-debian-12-r4)
      pullPolicy: IfNotPresent

    # Compte admin WordPress (password dans le secret)
    wordpressUsername: admin
    wordpressEmail: admin@poc.devops-hc.dev
    wordpressBlogName: "NKP Demo Blog"
    existingSecret: wordpress-credentials   # clé requise : wordpress-password

    # Persistance wp-content (thèmes, plugins, uploads)
    persistence:
      enabled: true
      size: 10Gi
      accessModes:
        - ReadWriteOnce
      # storageClass: ""  # vide = StorageClass par défaut

    # Init container qui chown le PVC : image à mirorer aussi
    volumePermissions:
      enabled: true
      image:
        registry: nkpdemo.devops-hc.dev:5000
        repository: dockerhub-cache/bitnami/os-shell
        pullPolicy: IfNotPresent

    # Service interne (l'accès passe par l'Ingress)
    service:
      type: ClusterIP

    # Ingress HTTPS via cert-manager + external-dns
    # IngressClass = traefik (Kommander/NKP utilise kommander-traefik comme controller)
    ingress:
      enabled: true
      ingressClassName: kommander-traefik
      hostname: wordpress.poc.devops-hc.dev
      pathType: Prefix
      tls: true            # → secret auto-créé : wordpress.poc.devops-hc.dev-tls
      selfSigned: false    # cert-manager le remplit
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-with-cloudflare
        external-dns.alpha.kubernetes.io/hostname: wordpress.poc.devops-hc.dev
        # Traefik n'écrit l'Address sur l'Ingress que si publishedService est configuré.
        # On fixe la cible explicitement pour external-dns (IP du LB kommander-traefik) :

    # Ressources explicites (désactive le preset par défaut "micro")
    resourcesPreset: "none"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

    # PodDisruptionBudget : inutile avec 1 replica, bloquerait drain de node
    pdb:
      create: false

    # =========================================================
    # MariaDB (sous-chart — StatefulSet)
    # =========================================================
    mariadb:
      enabled: true
      architecture: standalone    # mettre "replication" pour 2 STS HA

      image:
        registry: nkpdemo.devops-hc.dev:5000
        repository: dockerhub-cache/bitnami/mariadb
        pullPolicy: IfNotPresent

      auth:
        existingSecret: wordpress-credentials
        # Clés requises dans le secret :
        #   mariadb-root-password
        #   mariadb-password
        #   mariadb-replication-password (uniquement si architecture=replication)
        database: bitnami_wordpress
        username: bn_wordpress

      primary:
        persistence:
          enabled: true
          size: 8Gi
          accessModes:
            - ReadWriteOnce
        resourcesPreset: "none"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        # Init container chown
        volumePermissions:
          enabled: true
          image:
            registry: nkpdemo.devops-hc.dev:5000
            repository: dockerhub-cache/bitnami/os-shell
            pullPolicy: IfNotPresent
        pdb:
          create: false

   # --- MariaDB metrics (mysqld-exporter) ---
      metrics:
        enabled: true
        image:
          registry: nkpdemo.devops-hc.dev:5000
          repository: dockerhub-cache/bitnami/mysqld-exporter
          pullPolicy: IfNotPresent
        resourcesPreset: "none"
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits:   { cpu: 200m, memory: 128Mi }
        serviceMonitor:
          enabled: true
          interval: 30s
          # ⚠️ label requis pour être scrapé par le Prometheus NKP
          labels:
            release: kube-prometheus-stack

    # =========================================================
    # Désactivés pour rester simple
    # =========================================================
    memcached:
      enabled: false

    # --- WordPress metrics (apache-exporter) ---
    metrics:
      enabled: true
      image:
        registry: nkpdemo.devops-hc.dev:5000
        repository: dockerhub-cache/bitnami/apache-exporter
        pullPolicy: IfNotPresent
      resourcesPreset: "none"
      resources:
        requests: { cpu: 50m, memory: 64Mi }
        limits:   { cpu: 200m, memory: 128Mi }
      serviceMonitor:
        enabled: true
        interval: 30s
        # ⚠️ label requis pour être scrapé par le Prometheus NKP
        labels:
          release: kube-prometheus-stack
